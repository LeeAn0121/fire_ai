data:
  train_images: data/merged/train/images
  train_labels: data/merged/train/labels
  val_images: data/merged/val/images
  val_labels: data/merged/val/labels
  val_split: 0.2
  yaml: data/merged/data.yaml

detect:
  conf: 0.25             # 0.45 -> 0.25 (더 예민하게 감지)
  device: 0
  imgsz: 1024            # 640 -> 1024 (작은 불 감지력 향상)
  iou: 0.45
  output: output
  save_conf: true
  save_txt: false
  source: input
  vid_stride: 1
  person_filter: true    # false로 변경 (사람에 의한 화재 억제 방지)
  person_model: yolo26m.pt 
  overlap_threshold: 0.7

model:
  base: yolo26m.pt
  output_dir: model/release 
  path: model/release/result_v7.pt

pipeline:
  auto_detect: true
  min_new_images: 50
  poll_interval: 2
  retrain_on_new_data: true
  watch_dir: input

train:
  amp: true
  batch: 2
  cache: disk
  device: 0
  epochs: 50
  exist_ok: true
  imgsz: 896             # 1024는 VRAM 사용량이 커서 한 단계 낮춤
  rect: false
  close_mosaic: 5
  multi_scale: false
  mosaic: 1.0
  scale: 0.5
  hsv_h: 0.015           # 색상 변화 대응
  hsv_s: 0.7             # 채도 변화 대응 (강한 햇빛 대비)
  hsv_v: 0.4             # 명도 변화 대응 (햇빛/그림자 대비)
  name: fire_train
  patience: 30
  cos_lr: true
  project: runs/detect
  workers: 0
  plots: false
  val: true
  max_det: 50
